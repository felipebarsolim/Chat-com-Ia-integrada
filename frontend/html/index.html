<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../css/style.css" />
        <title>Document</title>
    </head>
    <body>
        <main>
            <div id="container-login">
                <div id="sub-container-esquerdo">
                    <img src="../assets/logo.png" alt="logo" />
                    <h2>Olá,</h2>
                    <h3>bem vindo!</h3>
                    <p>
                        Lorem ipsum dolor sit amet consectetur adipisicing elit.
                        Recusandae voluptatibus ad quis accusantium? Veritatis
                        enim sed, placeat.
                    </p>
                </div>
                <div id="sub-container-direito">
                    <form id="form">
                        <div class="camps">
                            <label>Email</label>
                            <input
                                type="email"
                                class="user"
                                id="user-email"
                                required
                            />
                            <label for="">Password</label>
                            <input
                                type="password"
                                class="user"
                                id="password"
                                required
                            />
                            <div id="remember">
                                <input
                                    type="checkbox"
                                    name=""
                                    id="remember-me"
                                />
                                <label>Remember-me</label>
                            </div>
                        </div>
                        <div>
                            <button type="submit" id="login">Login</button>
                        </div>
                    </form>
                    <button id="signup">Sign up</button>
                </div>
            </div>
        </main>
    </body>
    <script src="../js/index.js"></script>
</html>
